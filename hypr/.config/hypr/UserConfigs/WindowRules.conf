# /* ---- 💫 https://github.com/JaKooLit 💫 ---- */  #
# For window rules and layerrules
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# NOTES: This is for Hyprland >= 0.48 (new syntax)

# windowrulev - tags - add apps under appropriate tag to use the same settings
# browser tags
windowrulev = tag +browser, class:^(Firefox|org\.mozilla\.firefox|Firefox-esr|Firefox-bin|firefox|firefox-esr|firefox-bin)$
windowrulev = tag +browser, class:^(Google-chrome|google-chrome|Google-chrome-beta|google-chrome-beta|Google-chrome-dev|google-chrome-dev|Google-chrome-unstable|google-chrome-unstable)$
windowrulev = tag +browser, class:^(chrome-.+-Default)$ # Chrome PWAs
windowrulev = tag +browser, class:^(Chromium|chromium)$
windowrulev = tag +browser, class:^(Microsoft-edge|microsoft-edge|Microsoft-edge-stable|microsoft-edge-stable|Microsoft-edge-beta|microsoft-edge-beta|Microsoft-edge-dev|microsoft-edge-dev|Microsoft-edge-unstable|microsoft-edge-unstable)$
windowrulev = tag +browser, class:^(Brave-browser|brave-browser|Brave-browser-beta|brave-browser-beta|Brave-browser-dev|brave-browser-dev|Brave-browser-unstable|brave-browser-unstable)$
windowrulev = tag +browser, class:^(Thorium-browser|thorium-browser|Cachy-browser|cachy-browser)$
windowrulev = tag +browser, class:^(zen-alpha|zen)$

# notif tags
windowrulev = tag +notif, class:^(swaync-control-center|swaync-notification-window|swaync-client|class)$

# KooL settings tag
windowrulev = tag +KooL_Cheat, title:^(KooL Quick Cheat Sheet)$
windowrulev = tag +KooL_Settings, title:^(KooL Hyprland Settings)$
windowrulev = tag +KooL-Settings, class:^(nwg-displays|nwg-look)$

# terminal tags
# windowrulev = tag +terminal, class:^(Alacritty|kitty|kitty-dropterm)$

# email tags
windowrulev = tag +email, class:^(Thunderbird|thunderbird|org\.gnome\.Evolution)$
windowrulev = tag +email, class:^(eu\.betterbird\.Betterbird)$

# project tags
windowrulev = tag +projects, class:^(codium|codium-url-handler|VSCodium)$
windowrulev = tag +projects, class:^(VSCode|code-url-handler)$
windowrulev = tag +projects, class:^(jetbrains-.+)$ # JetBrains IDEs

# screenshare tags
windowrulev = tag +screenshare, class:^(com\.obsproject\.Studio)$

# IM tags
windowrulev = tag +im, class:^(Discord|discord|WebCord|webcord|Vesktop|vesktop)$
windowrulev = tag +im, class:^(Ferdium|ferdium)$
windowrulev = tag +im, class:^(Whatsapp-for-linux|whatsapp-for-linux)$
windowrulev = tag +im, class:^(ZapZap|com\.rtosta\.zapzap)$
windowrulev = tag +im, class:^(org\.telegram\.desktop|io\.github\.tdesktop_x64\.TDesktop)$
windowrulev = tag +im, class:^(teams-for-linux)$

# game tags
windowrulev = tag +games, class:^(gamescope)$
windowrulev = tag +games, class:^(steam_app_\d+)$

# gamestore tags
windowrulev = tag +gamestore, class:^(Steam|steam)$
windowrulev = tag +gamestore, title:^(Lutris|lutris)$
windowrulev = tag +gamestore, class:^(com\.heroicgameslauncher\.hgl)$

# file-manager tags
windowrulev = tag +file-manager, class:^(Thunar|thunar|org\.gnome\.Nautilus|Pcmanfm-qt|pcmanfm-qt)$
windowrulev = tag +file-manager, class:^(app\.drey\.Warp)$

# wallpaper tags
windowrulev = tag +wallpaper, class:^(Waytrogen|waytrogen)$

# multimedia tags
windowrulev = tag +multimedia, class:^(Audacious|audacious)$

# multimedia-video tags
windowrulev = tag +multimedia_video, class:^(Mpv|mpv|vlc)$

# settings tags
windowrulev = tag +settings, title:^(ROG Control)$
windowrulev = tag +settings, class:^(wihotspot|wihotspot-gui)$ # wifi hotspot
windowrulev = tag +settings, class:^(Baobab|baobab|org\.gnome\.Baobab)$ # Disk usage analyzer
windowrulev = tag +settings, class:^(gnome-disks)$
windowrulev = tag +settings, title:(Kvantum Manager)
windowrulev = tag +settings, class:^(file-roller|org\.gnome\.FileRoller)$ # archive manager
windowrulev = tag +settings, class:^(nm-applet|nm-connection-editor|blueman-manager)$
windowrulev = tag +settings, class:^(pavucontrol|org\.pulseaudio\.pavucontrol|com\.saivert\.pwvucontrol)$
windowrulev = tag +settings, class:^(qt5ct|qt6ct|Yad|yad)$
windowrulev = tag +settings, class:(xdg-desktop-portal-gtk)
windowrulev = tag +settings, class:^(org\.kde\.polkit-kde-authentication-agent-1)$
windowrulev = tag +settings, class:^(Rofi|rofi)$

# viewer tags
windowrulev = tag +viewer, class:^(gnome-system-monitor|org\.gnome\.SystemMonitor|io\.missioncenter\.MissionCenter)$ # system monitor
windowrulev = tag +viewer, class:^(evince)$ # document viewer
windowrulev = tag +viewer, class:^(eog|org\.gnome\.Loupe)$ # image viewer

# floating_center tag - все флоатинг окна, кроме исключений
windowrulev = tag +floating_center, floating:1
windowrulev = tag -floating_center, title:^()$                      # контекстные меню (пустой тайтл)
windowrulev = tag -floating_center, title:^(Picture-in-Picture)$    # PiP — своя позиция
windowrulev = tag -floating_center, tag:notif                       # уведомления

# Some special override rules
windowrulev = noblur, tag:multimedia_video
windowrulev = opacity 1.0 override 1.0 override, tag:multimedia_video

# POSITION
windowrulev = center, tag:floating_center   # центрируем все флоатинг окна (кроме исключений выше)
windowrulev = center, tag:KooL_Cheat
windowrulev = center, class:(Thunar|thunar)
windowrulev = center, title:^(ROG Control)$
windowrulev = center, tag:KooL-Settings
windowrulev = center, title:^(Keybindings)$
windowrulev = center, class:^(pavucontrol|org\.pulseaudio\.pavucontrol|com\.saivert\.pwvucontrol)$
windowrulev = center, class:^(Whatsapp-for-linux|whatsapp-for-linux|ZapZap|com\.rtosta\.zapzap)$
windowrulev = center, class:^(Ferdium|ferdium)$
windowrulev = move 72% 7%, title:^(Picture-in-Picture)$
#windowrulev = move 72% 7%, title:^(Firefox)$

# windowrulev to avoid idle for fullscreen apps
windowrulev = idleinhibit fullscreen, fullscreen:1

# windowrulev move to workspace
windowrulev = workspace 1, tag:email
windowrulev = workspace 2, tag:browser
#windowrulev = workspace 3, class:^(Thunar|thunar)$
#windowrulev = workspace 3, tag:projects
windowrulev = workspace 5, tag:gamestore
windowrulev = workspace 7, tag:im
windowrulev = workspace 8, tag:games

# windowrulev move to workspace (silent)
windowrulev = workspace 4 silent, tag:screenshare
windowrulev = workspace 6 silent, class:^(virt-manager)$
windowrulev = workspace 6 silent, class:^(\.virt-manager-wrapped)$
windowrulev = workspace 9 silent, tag:multimedia

# FLOAT
windowrulev = float, tag:KooL_Cheat
windowrulev = float, tag:wallpaper
windowrulev = float, tag:settings
windowrulev = float, tag:viewer
windowrulev = float, tag:KooL-Settings
windowrulev = float, class:(Zoom|zoom|onedriver|onedriver-launcher)$
windowrulev = float, class:(org\.gnome\.Calculator), title:(Calculator)
windowrulev = float, class:^(mpv|com\.github\.rafostar\.Clapper)$
windowrulev = float, class:^(Qalculate-gtk|qalculate-gtk)$
#windowrulev = float, class:^(Whatsapp-for-linux|whatsapp-for-linux|ZapZap|com\.rtosta\.zapzap)$
windowrulev = float, class:^(Ferdium|ferdium)$
windowrulev = float, title:^(Picture-in-Picture)$
#windowrulev = float, title:^(Firefox)$

# windowrulev - ######### float popups and dialogue #######
windowrulev = float, title:^(Authentication Required)$
windowrulev = center, title:^(Authentication Required)$
windowrulev = float, class:(codium|codium-url-handler|VSCodium)
windowrulev = float, class:^(com\.heroicgameslauncher\.hgl)$
windowrulev = float, class:^(Steam|steam)$
windowrulev = float, class:(Thunar|thunar)

windowrulev = float, title:^(Add Folder to Workspace)$
windowrulev = size 70% 60%, title:^(Add Folder to Workspace)$
windowrulev = center, title:^(Add Folder to Workspace)$

windowrulev = float, title:^(Save As)$
windowrulev = size 70% 60%, title:^(Save As)$
windowrulev = center, title:^(Save As)$

windowrulev = float, initialTitle:(Open Files)
windowrulev = size 70% 60%, initialTitle:(Open Files)

windowrulev = float, title:^(SDDM Background)$ #KooL's Dots YAD for setting SDDM background
windowrulev = center, title:^(SDDM Background)$ #KooL's Dots YAD for setting SDDM background
windowrulev = size 16% 12%, title:^(SDDM Background)$ #KooL's Dots YAD for setting SDDM background
# END of float popups and dialogue #######

# OPACITY
windowrulev = opacity 0.9 0.7, tag:browser
windowrulev = opacity 0.9 0.8, tag:projects
windowrulev = opacity 0.94 0.86, tag:im
windowrulev = opacity 0.94 0.86, tag:multimedia
windowrulev = opacity 0.9 0.8, tag:file-manager
windowrulev = opacity 0.8 0.7, tag:terminal
windowrulev = opacity 0.8 0.7, tag:settings
windowrulev = opacity 0.82 0.75, tag:viewer
windowrulev = opacity 0.9 0.7, tag:wallpaper
windowrulev = opacity 0.8 0.7, class:^(gedit|org\.gnome\.TextEditor|mousepad)$
windowrulev = opacity 0.9 0.8, class:^(deluge)$
windowrulev = opacity 0.9 0.8, class:^(im\.riot\.Riot)$ # Element matrix client
windowrulev = opacity 0.9 0.8, class:^(seahorse)$ # gnome-keyring gui
windowrulev = opacity 0.95 0.75, title:^(Picture-in-Picture)$

# SIZE
windowrulev = size 65% 90%, tag:KooL_Cheat
windowrulev = size 70% 70%, tag:wallpaper
windowrulev = size 70% 70%, tag:settings
windowrulev = size 60% 70%, class:^(Whatsapp-for-linux|whatsapp-for-linux|ZapZap|com\.rtosta\.zapzap)$
windowrulev = size 60% 70%, class:^(Ferdium|ferdium)$

#windowrulev = size 25% 25%, title:^(Picture-in-Picture)$
#windowrulev = size 25% 25%, title:^(Firefox)$

# PINNING
windowrulev = pin, title:^(Picture-in-Picture)$
#windowrulev = pin, title:^(Firefox)$

# windowrulev - extras
windowrulev = keepaspectratio, title:^(Picture-in-Picture)$

# BLUR & FULLSCREEN
windowrulev = noblur, tag:games
windowrulev = fullscreen, tag:games

#windowrulev = bordercolor rgb(EE4B55) rgb(880808), fullscreen:1
#windowrulev = bordercolor rgb(282737) rgb(1E1D2D), floating:1
#windowrulev = opacity 0.8 0.8, pinned:1

# LAYER RULES
layerrulev = blur, layer:rofi
layerrulev = ignorezero, layer:rofi
layerrulev = blur, layer:notifications
layerrulev = ignorezero, layer:notifications
#layerrule = ignorealpha 0.5, notifications

#layerrule = ignorezero, rofi
#layerrule = blur, rofi
#layerrule = unset, rofi

#layerrule = ignorezero, overview
#layerrule = blur, overview
